name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            binary: safeshell-mcp-macos-arm64

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: safeshell-mcp-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            binary: safeshell-mcp-linux-arm64

          - target: i686-pc-windows-msvc
            os: windows-latest
            binary: safeshell-mcp-windows-x86.exe

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: safeshell-mcp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: ${{ !contains(matrix.os, 'windows') }}
        run: cp target/${{ matrix.target }}/release/safeshell-mcp ${{ matrix.binary }}

      - name: Rename binary (windows)
        if: contains(matrix.os, 'windows')
        run: copy target\${{ matrix.target }}\release\safeshell-mcp.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
