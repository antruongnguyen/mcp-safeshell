name: Cross-compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-compile:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            binary: safeshell-mcp-macos-arm64

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: safeshell-mcp-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            binary: safeshell-mcp-linux-arm64

          - target: i686-pc-windows-msvc
            os: windows-latest
            binary: safeshell-mcp-windows-x86.exe

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: safeshell-mcp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: target/${{ matrix.target }}/release/safeshell-mcp${{ contains(matrix.os, 'windows') && '.exe' || '' }}
